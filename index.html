<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bro.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
    }

    .bro-button {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 700;
      padding: 0.4em 0.8em;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 50%, #9b5de5 100%);
      color: #0f0f23;
      box-shadow:
        0 0 40px rgba(0, 245, 212, 0.4),
        0 0 80px rgba(155, 93, 229, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: visible;
    }

    .bro-button:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 60px rgba(0, 245, 212, 0.5),
        0 0 120px rgba(155, 93, 229, 0.3);
    }

    .bro-button:active {
      transform: scale(0.98);
    }

    .bro-button.animate-out {
      animation: buttonYeet 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      pointer-events: none;
    }

    .bro-button.gone {
      display: none;
    }

    @keyframes buttonYeet {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.3) rotate(-5deg);
        opacity: 1;
      }
      100% {
        transform: scale(0) rotate(20deg);
        opacity: 0;
      }
    }

    .pill-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .pill-container > * {
      pointer-events: auto;
    }

    .bro-pill {
      position: fixed;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: transform 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    .bro-pill:hover {
      transform: scale(1.15);
    }

    .bro-pill.fly-out {
      animation: pillFly 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    @keyframes pillFly {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 1;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1);
        opacity: 1;
      }
    }

    .aura-display {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #00f5d4;
      text-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .aura-display.clickable {
      pointer-events: auto;
      cursor: pointer;
      color: #00f5d4;
      text-shadow:
        0 0 20px rgba(0, 245, 212, 0.6),
        0 0 40px rgba(0, 245, 212, 0.4),
        0 0 60px rgba(155, 93, 229, 0.3);
      animation: auraGlow 2s ease-in-out infinite;
    }

    .aura-display.clickable:hover {
      transform: translateX(-50%) scale(1.08);
      text-shadow:
        0 0 30px rgba(0, 245, 212, 0.8),
        0 0 50px rgba(0, 245, 212, 0.5),
        0 0 80px rgba(155, 93, 229, 0.4);
    }

    @keyframes auraGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .aura-display span {
      color: #9b5de5;
      margin-right: 0.25em;
    }

    .upgrade-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(15, 15, 35, 0.9);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .upgrade-menu.open {
      display: flex;
    }

    .upgrade-menu-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid rgba(0, 245, 212, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0, 245, 212, 0.2);
    }

    .upgrade-menu h2 {
      font-family: 'Space Grotesk', sans-serif;
      color: #00f5d4;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .upgrade-tree {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .upgrade-node {
      background: rgba(0, 245, 212, 0.08);
      border: 1px solid rgba(0, 245, 212, 0.2);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      transition: all 0.2s ease;
    }

    .upgrade-node.available {
      border-color: rgba(0, 245, 212, 0.5);
      background: rgba(0, 245, 212, 0.12);
    }

    .upgrade-node.purchased {
      border-color: rgba(155, 93, 229, 0.5);
      background: rgba(155, 93, 229, 0.15);
    }

    .upgrade-node.locked {
      opacity: 0.5;
      pointer-events: none;
    }

    .upgrade-node-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .upgrade-node-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: #fff;
      font-size: 1.1rem;
    }

    .upgrade-node-cost {
      font-size: 0.9rem;
      color: #9b5de5;
    }

    .upgrade-node-desc {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.4;
    }

    .upgrade-node-btn {
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #00f5d4, #00bbf9);
      color: #0f0f23;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .upgrade-node-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
    }

    .upgrade-node-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .upgrade-node.purchased .upgrade-node-btn {
      display: none;
    }

    .menu-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
      line-height: 1;
    }

    .menu-close:hover {
      color: #fff;
    }

    .custom-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 32px;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease-out;
    }

    .bruh-launcher {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      font-size: 48px;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 14px rgba(0, 245, 212, 0.6));
    }

    body.flex-cursor {
      cursor: none;
    }

    body.flex-cursor * {
      cursor: none;
    }

    .subtitle {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
    }

    .bruther-button {
      position: fixed;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.6rem 1.7rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #f15bb5, #fee440);
      color: #0f0f23;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.95rem;
      cursor: pointer;
      z-index: 11;
      box-shadow:
        0 0 20px rgba(241, 91, 181, 0.6),
        0 0 40px rgba(254, 228, 64, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .bruther-button:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow:
        0 0 26px rgba(241, 91, 181, 0.8),
        0 0 50px rgba(254, 228, 64, 0.6);
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="pill-container" id="pillContainer"></div>
  <div class="container">
    <button class="bro-button" id="broButton">Bro.</button>
  </div>
  <div class="aura-display" id="auraDisplay" style="display: none;"><span>Aura</span><span id="auraCount">0</span></div>
  <div class="upgrade-menu" id="upgradeMenu">
    <button class="menu-close" id="menuClose" aria-label="Close">&times;</button>
    <div class="upgrade-menu-content">
      <h2>Upgrade Tree</h2>
      <div class="upgrade-tree" id="upgradeTree"></div>
    </div>
  </div>
  <div class="custom-cursor" id="customCursor" style="display: none;">💪</div>
  <p class="subtitle" id="subtitle">no cap fr fr</p>
  <button class="bruther-button" id="brutherButton" style="display: none;">BRUTHER</button>

  <script>
    const button = document.getElementById('broButton');
    const pillContainer = document.getElementById('pillContainer');
    const auraDisplay = document.getElementById('auraDisplay');
    const auraCountEl = document.getElementById('auraCount');
    const upgradeMenu = document.getElementById('upgradeMenu');
    const menuClose = document.getElementById('menuClose');
    const customCursor = document.getElementById('customCursor');
    const subtitle = document.getElementById('subtitle');
    const brutherButton = document.getElementById('brutherButton');

    let auraPoints = 0;

    const colors = [
      'linear-gradient(135deg, #00f5d4, #00bbf9)',
      'linear-gradient(135deg, #9b5de5, #f15bb5)',
      'linear-gradient(135deg, #fee440, #00f5d4)',
      'linear-gradient(135deg, #00bbf9, #9b5de5)',
      'linear-gradient(135deg, #f15bb5, #fee440)',
    ];

    const MAX_PILLS = 200;

    const HIT_RADIUS_BASE = 0;
    const HIT_RADIUS_FLEX_SMALL = 70;
    const HIT_RADIUS_FLEX_MED = 100;
    const HIT_RADIUS_FLEX_LARGE = 140;
    let hitRadius = HIT_RADIUS_BASE;

    const driftingPills = [];
    const bruhLaunchers = [];
    const bruhConfig = {
      maxCount: 0,
      durationMs: 0,
    };
    let bruhAutoEnabled = false;
    let bruhAutoIntervalMs = 5000;
    let bruhAutoTimerId = null;

    function getRandomColor() {
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function getPillCount() {
      return pillContainer.querySelectorAll('.bro-pill').length;
    }

    const upgradeTree = [
      {
        id: 'flexOnEm',
        name: 'Flex on Em',
        description: 'Unlock flex cursor. Slightly bigger arm, bigger click aura.',
        cost: 10,
        icon: '💪',
        prerequisites: [],
      },
      {
        id: 'flexOnEmXL',
        name: 'Flex on Em XL',
        description: 'Arm day, every day. Cursor gets even more jacked.',
        cost: 25,
        icon: '💪💪',
        prerequisites: ['flexOnEm'],
      },
      {
        id: 'gigaFlex',
        name: 'Giga Flex Mythic',
        description: 'Too much deltoid. The aura radius is actually illegal.',
        cost: 60,
        icon: '💪✨',
        prerequisites: ['flexOnEmXL'],
      },
      {
        id: 'bruhCore',
        name: 'Bruh Launcher',
        description: 'Click to spawn one 😎 Bruh orb that bounces for 10s and breaks bro pills.',
        cost: 20,
        icon: '😎',
        prerequisites: [],
      },
      {
        id: 'bruhLonger',
        name: 'Extended Bruh Mix',
        description: 'Bruh orbs vibe on screen longer before fading.',
        cost: 40,
        icon: '⏱️',
        prerequisites: ['bruhCore'],
      },
      {
        id: 'bruhSquad',
        name: 'Bruh Squad Goals',
        description: 'Have up to 3 Bruh orbs bouncing at once.',
        cost: 75,
        icon: '😎😎',
        prerequisites: ['bruhCore', 'bruhLonger'],
      },
      {
        id: 'autoBruh',
        name: 'Auto Bruh Engine',
        description: 'Spawns Bruh orbs automatically over time. Hands-free chaos.',
        cost: 120,
        icon: '🎛️',
        prerequisites: ['bruhSquad'],
      },
      {
        id: 'bruther',
        name: 'BRUTHER',
        description: 'Unlocks the BRUTHER button. Smashes almost every bro on screen at once.',
        cost: 200,
        icon: '🧍‍♂️🤝🧍‍♂️',
        prerequisites: ['gigaFlex', 'bruhSquad'],
      },
    ];

    const purchasedUpgrades = new Set();

    function addAura() {
      auraPoints++;
      auraCountEl.textContent = auraPoints;
      if (auraPoints >= 10 && !auraDisplay.classList.contains('clickable')) {
        auraDisplay.classList.add('clickable');
      }
    }

    function canPurchase(upgrade) {
      if (purchasedUpgrades.has(upgrade.id)) return false;
      if (auraPoints < upgrade.cost) return false;
      for (const depId of upgrade.prerequisites) {
        if (!purchasedUpgrades.has(depId)) return false;
      }
      return true;
    }

    function applyFlexOnEmBase() {
      document.body.classList.add('flex-cursor');
      customCursor.style.display = 'block';
      customCursor.style.fontSize = '32px';
      hitRadius = HIT_RADIUS_FLEX_SMALL;
      document.addEventListener('mousemove', (e) => {
        customCursor.style.left = e.clientX + 'px';
        customCursor.style.top = e.clientY + 'px';
      });
    }

    function applyFlexOnEmXL() {
      customCursor.style.fontSize = '42px';
      hitRadius = HIT_RADIUS_FLEX_MED;
    }

    function applyGigaFlex() {
      customCursor.style.fontSize = '56px';
      hitRadius = HIT_RADIUS_FLEX_LARGE;
    }

    function applyBruhCore() {
      bruhConfig.maxCount = Math.max(bruhConfig.maxCount, 1);
      bruhConfig.durationMs = Math.max(bruhConfig.durationMs, 10000);
    }

    function applyBruhLonger() {
      bruhConfig.durationMs = Math.max(bruhConfig.durationMs, 18000);
    }

    function applyBruhSquad() {
      bruhConfig.maxCount = Math.max(bruhConfig.maxCount, 3);
    }

    function startBruhAuto() {
      if (!bruhAutoEnabled) return;
      if (bruhAutoTimerId) return;
      bruhAutoTimerId = setInterval(() => {
        if (bruhConfig.maxCount <= 0) return;
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        createBruhLauncher(x, y);
      }, bruhAutoIntervalMs);
    }

    function applyAutoBruh() {
      bruhAutoEnabled = true;
      bruhAutoIntervalMs = 5000;
      startBruhAuto();
    }

    function applyBruther() {
      if (subtitle) subtitle.style.display = 'none';
      if (brutherButton) brutherButton.style.display = 'inline-block';
    }

    function applyUpgradeEffects(upgrade) {
      switch (upgrade.id) {
        case 'flexOnEm':
          applyFlexOnEmBase();
          break;
        case 'flexOnEmXL':
          applyFlexOnEmXL();
          break;
        case 'gigaFlex':
          applyGigaFlex();
          break;
        case 'bruhCore':
          applyBruhCore();
          break;
        case 'bruhLonger':
          applyBruhLonger();
          break;
        case 'bruhSquad':
          applyBruhSquad();
          break;
        case 'autoBruh':
          applyAutoBruh();
          break;
        case 'bruther':
          applyBruther();
          break;
      }
    }

    function purchaseUpgrade(upgrade) {
      if (!canPurchase(upgrade)) return;
      auraPoints -= upgrade.cost;
      auraCountEl.textContent = auraPoints;
      purchasedUpgrades.add(upgrade.id);
      applyUpgradeEffects(upgrade);
      renderUpgradeTree();
    }

    function renderUpgradeTree() {
      const treeEl = document.getElementById('upgradeTree');
      treeEl.innerHTML = '';
      for (const upgrade of upgradeTree) {
        const node = document.createElement('div');
        const purchased = purchasedUpgrades.has(upgrade.id);
        const available = canPurchase(upgrade);
        const locked = !purchased && !available && upgrade.prerequisites.some(id => !purchasedUpgrades.has(id));
        node.className = 'upgrade-node' + (purchased ? ' purchased' : available ? ' available' : locked ? ' locked' : '');
        node.innerHTML = `
          <div class="upgrade-node-header">
            <span class="upgrade-node-name">${upgrade.icon || ''} ${upgrade.name}</span>
            ${!purchased ? `<span class="upgrade-node-cost">${upgrade.cost} Aura</span>` : '<span class="upgrade-node-cost">✓ Owned</span>'}
          </div>
          <div class="upgrade-node-desc">${upgrade.description}</div>
          ${!purchased ? `<button class="upgrade-node-btn" ${!available ? 'disabled' : ''}>Purchase</button>` : ''}
        `;
        const btn = node.querySelector('.upgrade-node-btn');
        if (btn && available) {
          btn.addEventListener('click', () => purchaseUpgrade(upgrade));
        }
        treeEl.appendChild(node);
      }
    }

    auraDisplay.addEventListener('click', () => {
      if (!auraDisplay.classList.contains('clickable')) return;
      upgradeMenu.classList.add('open');
      renderUpgradeTree();
    });

    menuClose.addEventListener('click', () => upgradeMenu.classList.remove('open'));
    upgradeMenu.addEventListener('click', (e) => {
      if (e.target === upgradeMenu) upgradeMenu.classList.remove('open');
    });

    function playBrotherSound() {
      const utterance = new SpeechSynthesisUtterance('BROTHER!!!!');
      utterance.rate = 0.9;
      utterance.pitch = 0.8;
      const voices = speechSynthesis.getVoices();
      const male = voices.find(v =>
        (v.lang.startsWith('en') && (
          v.name.includes('Male') ||
          v.name.includes('Daniel') ||
          v.name.includes('David') ||
          v.name.includes('Mark') ||
          v.name.includes('James') ||
          v.name.includes('Paul') ||
          v.name.includes('George')
        ))
      );
      if (male) utterance.voice = male;
      speechSynthesis.speak(utterance);
    }

    if (brutherButton) {
      brutherButton.addEventListener('click', () => {
        const pills = [...pillContainer.querySelectorAll('.bro-pill')];
        if (pills.length === 0) return;

        // choose up to 5 survivors
        const survivorCount = Math.min(5, pills.length);
        const indices = pills.map((_, i) => i);
        const survivors = new Set();
        while (survivors.size < survivorCount && indices.length) {
          const idx = Math.floor(Math.random() * indices.length);
          survivors.add(indices[idx]);
          indices.splice(idx, 1);
        }

        playBrotherSound();

        pills.forEach((pill, index) => {
          if (!survivors.has(index)) {
            hitPill(pill);
          }
        });
      });
    }

    function hitPill(pill) {
      addAura();
      const rect = pill.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      stopDrifting(pill);
      pill.remove();
      for (let i = 0; i < 5; i++) {
        if (getPillCount() >= MAX_PILLS) break;
        createPillAt(cx, cy, { flyOut: false });
      }
    }

    function createPillAt(x, y, options = {}) {
      if (getPillCount() >= MAX_PILLS) return null;
      const { flyOut = false, tx = 0, ty = 0 } = options;
      const pill = document.createElement('span');
      pill.className = 'bro-pill' + (flyOut ? ' fly-out' : '');
      pill.textContent = 'bro';
      pill.style.left = x + 'px';
      pill.style.top = y + 'px';
      pill.style.background = getRandomColor();
      pill.style.color = '#0f0f23';
      if (flyOut) {
        pill.style.setProperty('--tx', tx + 'px');
        pill.style.setProperty('--ty', ty + 'px');
      }
      pillContainer.appendChild(pill);

      if (flyOut) {
        pill.addEventListener('animationend', () => startDrifting(pill), { once: true });
      } else {
        startDrifting(pill);
      }

      pill.addEventListener('click', (e) => {
        e.stopPropagation();
        hitPill(pill);
      });

      return pill;
    }

    function startDrifting(pill) {
      const rect = pill.getBoundingClientRect();
      const speed = 0.8 + Math.random() * 1.2;
      const angle = Math.random() * Math.PI * 2;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      pill.classList.remove('fly-out');
      pill.style.animation = 'none';
      pill.style.opacity = '1';
      const state = { x: rect.left, y: rect.top, vx, vy, el: pill };
      driftingPills.push(state);
    }

    function stopDrifting(pill) {
      const idx = driftingPills.findIndex(s => s.el === pill);
      if (idx !== -1) driftingPills.splice(idx, 1);
    }

    function createBruhLauncher(x, y) {
      if (bruhConfig.maxCount <= 0) return;
      if (bruhLaunchers.length >= bruhConfig.maxCount) return;
      const el = document.createElement('span');
      el.className = 'bruh-launcher';
      el.textContent = '😎';
      pillContainer.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 1.5;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      bruhLaunchers.push({
        x,
        y,
        vx,
        vy,
        el,
        expiresAt: performance.now() + bruhConfig.durationMs,
      });
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('#upgradeMenu') || e.target.closest('#auraDisplay') || e.target.closest('#broButton')) return;

      if (purchasedUpgrades.has('flexOnEm') && hitRadius > 0 && !e.target.closest('.bro-pill')) {
        const radius = hitRadius;
        const pills = [...pillContainer.querySelectorAll('.bro-pill')];
        let closest = null;
        let closestDist = radius;
        for (const pill of pills) {
          const rect = pill.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < closestDist) {
            closestDist = d;
            closest = pill;
          }
        }
        if (closest) {
          e.preventDefault();
          e.stopPropagation();
          hitPill(closest);
        }
      }

      if (purchasedUpgrades.has('bruhCore')) {
        createBruhLauncher(e.clientX, e.clientY);
      }
    }, true);

    function gameLoop() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const pillW = 60;
      const pillH = 30;

      for (const s of driftingPills) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x <= 0) { s.x = 0; s.vx = -s.vx; }
        if (s.x >= w - pillW) { s.x = w - pillW; s.vx = -s.vx; }
        if (s.y <= 0) { s.y = 0; s.vy = -s.vy; }
        if (s.y >= h - pillH) { s.y = h - pillH; s.vy = -s.vy; }
        s.el.style.left = s.x + 'px';
        s.el.style.top = s.y + 'px';
      }

      const now = performance.now();
      for (let i = bruhLaunchers.length - 1; i >= 0; i--) {
        const b = bruhLaunchers[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.x <= 0) { b.x = 0; b.vx = -b.vx; }
        if (b.x >= w) { b.x = w; b.vx = -b.vx; }
        if (b.y <= 0) { b.y = 0; b.vy = -b.vy; }
        if (b.y >= h) { b.y = h; b.vy = -b.vy; }
        b.el.style.left = b.x + 'px';
        b.el.style.top = b.y + 'px';

        // Bruh breaks & splits pills it touches (respecting cap)
        for (let j = driftingPills.length - 1; j >= 0; j--) {
          const s = driftingPills[j];
          const rect = s.el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = b.x - cx;
          const dy = b.y - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 30) {
            // Similar to a click, but a bit lighter split
            addAura();
            stopDrifting(s.el);
            s.el.remove();
            driftingPills.splice(j, 1);
            for (let k = 0; k < 3; k++) {
              if (getPillCount() >= MAX_PILLS) break;
              createPillAt(cx, cy, { flyOut: false });
            }
          }
        }

        if (now > b.expiresAt) {
          b.el.remove();
          bruhLaunchers.splice(i, 1);
        }
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    function playBroSound() {
      const utterance = new SpeechSynthesisUtterance('Burrrroow');
      utterance.rate = 0.85;
      utterance.pitch = 0.72;
      const voices = speechSynthesis.getVoices();
      const male = voices.find(v =>
        (v.lang.startsWith('en') && (
          v.name.includes('Male') ||
          v.name.includes('Daniel') ||
          v.name.includes('David') ||
          v.name.includes('Mark') ||
          v.name.includes('James') ||
          v.name.includes('Paul') ||
          v.name.includes('George')
        ))
      );
      if (male) utterance.voice = male;
      speechSynthesis.speak(utterance);
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => {};
    }

    button.addEventListener('click', () => {
      if (button.classList.contains('animate-out')) return;
      playBroSound();
      auraDisplay.style.display = 'block';
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      button.classList.add('animate-out');
      setTimeout(() => button.classList.add('gone'), 650);

      const initialPillCount = 55;
      for (let i = 0; i < initialPillCount; i++) {
        if (getPillCount() >= MAX_PILLS) break;
        const angle = (i / initialPillCount) * Math.PI * 2 + Math.random() * 0.5;
        const dist = 120 + Math.random() * 180;
        const tx = Math.cos(angle) * dist + (Math.random() - 0.5) * 80;
        const ty = Math.sin(angle) * dist + (Math.random() - 0.5) * 80;
        const delay = Math.random() * 120;
        setTimeout(() => {
          if (getPillCount() >= MAX_PILLS) return;
          createPillAt(centerX, centerY, { flyOut: true, tx, ty });
        }, delay);
      }
    });
  </script>
</body>
</html>
